<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>SafeMail-X</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      font-family: Arial, sans-serif;
      background: #fff;
      color: #111;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 18px;
      border-bottom: 1px solid #eee;
    }

    .shield-wrap { transition: transform 0.25s ease; }
    .shield-wrap.pulse { animation: shieldPulse 0.35s ease; }
    @keyframes shieldPulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.18); }
      100% { transform: scale(1); }
    }

    .header-text h3 { font-size: 15px; font-weight: 600; line-height: 1.2; }
    .header-text p  { font-size: 11px; color: #888; }

    /* Body */
    .body { padding: 18px; }

    /* Scan button */
    #scanBtn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 11px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, border-color 0.15s;
    }
    #scanBtn:hover:not(:disabled) { background: #f5f5f5; border-color: #ccc; }
    #scanBtn:active:not(:disabled) { transform: scale(0.98); }
    #scanBtn:disabled { cursor: default; opacity: 0.7; }

    /* Progress */
    #progress-wrap { display: none; margin-top: 14px; }
    .progress-track {
      height: 3px;
      background: #eee;
      border-radius: 99px;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      width: 0%;
      background: #1a6fbe;
      border-radius: 99px;
      transition: width 0.28s ease;
    }
    #progress-label {
      margin-top: 6px;
      font-size: 12px;
      color: #888;
      text-align: center;
      min-height: 16px;
    }

    /* Result card */
    #result {
      display: none;
      margin-top: 14px;
      border-radius: 8px;
      padding: 13px 14px;
      border: 1px solid transparent;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    #result.visible { opacity: 1; transform: translateY(0); }
    #result.safe    { background: #edf7e6; border-color: #7bc96f; }
    #result.threat  { background: #fdecea; border-color: #e57373; }
    #result.error   { background: #fff8e1; border-color: #ffc107; }

    .result-header { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .result-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    #result.safe   .result-dot { background: #4caf50; }
    #result.threat .result-dot { background: #e53935; }
    #result.error  .result-dot { background: #ffa000; }

    #result-title { font-size: 13px; font-weight: 600; }
    #result.safe   #result-title { color: #2e7d32; }
    #result.threat #result-title { color: #b71c1c; }
    #result.error  #result-title { color: #e65100; }

    #result-desc { font-size: 12px; color: #555; line-height: 1.5; }

    /* PDF download button */
    #downloadPdfBtn {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 7px;
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border: 1px solid #1a6fbe;
      border-radius: 8px;
      background: #fff;
      color: #1a6fbe;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    #downloadPdfBtn:hover  { background: #e8f1fb; }
    #downloadPdfBtn:active { transform: scale(0.98); }
    #downloadPdfBtn.show   { display: flex; }
  </style>
</head>

<body>

  <div class="header">
    <div class="shield-wrap" id="shieldWrap">
      <svg width="34" height="34" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path id="shieldBody" d="M16 3L5 7.5V15.5C5 21.5 9.5 27 16 29C22.5 27 27 21.5 27 15.5V7.5L16 3Z"
              fill="#E3F0FB" stroke="#1a6fbe" stroke-width="1.5" style="transition:fill 0.3s,stroke 0.3s;"/>
        <path id="shieldCheck" d="M11 16L14 19L21 12"
              stroke="#1a6fbe" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              opacity="0" style="transition:opacity 0.3s,stroke 0.3s;"/>
        <line id="shieldX1" x1="12" y1="12" x2="20" y2="20"
              stroke="#e53935" stroke-width="2" stroke-linecap="round"
              opacity="0" style="transition:opacity 0.3s;"/>
        <line id="shieldX2" x1="20" y1="12" x2="12" y2="20"
              stroke="#e53935" stroke-width="2" stroke-linecap="round"
              opacity="0" style="transition:opacity 0.3s;"/>
      </svg>
    </div>
    <div class="header-text">
      <h3>SafeMail-X</h3>
      <p>Email threat scanner</p>
    </div>
  </div>

  <div class="body">

    <button id="scanBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <span id="btnText">Scan current email</span>
    </button>

    <div id="progress-wrap">
      <div class="progress-track"><div id="progress-bar"></div></div>
      <p id="progress-label"></p>
    </div>

    <div id="result">
      <div class="result-header">
        <div class="result-dot"></div>
        <span id="result-title"></span>
      </div>
      <p id="result-desc"></p>
    </div>

    <button id="downloadPdfBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="12" y1="12" x2="12" y2="18"/>
        <polyline points="9 15 12 18 15 15"/>
      </svg>
      Download Forensic Report
    </button>

  </div>

<script src="popup.js"></script>
</body>

</html>
